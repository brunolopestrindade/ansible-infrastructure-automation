---
# inventory/production/hosts.yml
# Real IPs are stored in ansible-vault (group_vars/all/vault.yml)
# This file uses variable references only — no plaintext IPs.

all:
  children:
    webservers:
      hosts:
        web-prod-01:
          ansible_host: "{{ vault_web_prod_01_ip }}"
        web-prod-02:
          ansible_host: "{{ vault_web_prod_02_ip }}"

    databases:
      hosts:
        db-prod-primary:
          ansible_host: "{{ vault_db_prod_primary_ip }}"
          mysql_role: primary
        db-prod-replica:
          ansible_host: "{{ vault_db_prod_replica_ip }}"
          mysql_role: replica

    monitoring:
      hosts:
        elk-prod-01:
          ansible_host: "{{ vault_elk_prod_01_ip }}"

  vars:
    ansible_user: "{{ ops_user }}"
    ansible_ssh_private_key_file: "~/.ssh/infra_prod_key"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=yes"
    ansible_python_interpreter: /usr/bin/python3
