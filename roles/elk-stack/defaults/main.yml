---
# roles/elk-stack/defaults/main.yml
# Override any of these in group_vars/monitoring/vars.yml

elk_version: "8.12.0"
elk_version_major: "8"

elasticsearch_heap_size: "2g"
elasticsearch_cluster_name: "infrastructure-monitoring"
elasticsearch_http_port: 9200
elasticsearch_transport_port: 9300

kibana_port: 5601
kibana_server_name: "kibana.internal"

logstash_beats_port: 5044
logstash_heap_size: "1g"

# Index Lifecycle Management — default 30-day retention
elk_ilm_policies:
  - name: "infra-logs-policy"
    policy:
      policy:
        phases:
          hot:
            actions:
              rollover:
                max_size: "10gb"
                max_age: "7d"
          delete:
            min_age: "30d"
            actions:
              delete: {}
